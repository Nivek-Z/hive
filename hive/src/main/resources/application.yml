server:
  port: 8080

spring:
  application:
    name: hive
  datasource:
    # createDatabaseIfNotExist: 首次启动自动建库；schema.sql/data.sql 幂等，自动建表
    url: jdbc:mysql://localhost:3306/hive_db?createDatabaseIfNotExist=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${HIVE_DB_USER:root}
    password: ${HIVE_DB_PASSWORD:123456}
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis:
  configuration:
    map-underscore-to-camel-case: true

hive:
  jwt:
    # 课程演示用默认密钥，生产环境应使用环境变量注入
    secret: ${HIVE_JWT_SECRET:hive-2026-course-project-secret-key-7f3a9c1e}
    expire-days: 7
  upload-dir: ./uploads

logging:
  level:
    com.hive: info
