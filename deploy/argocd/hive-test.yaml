apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hive-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:Nivek-Z/hive.git
    targetRevision: codex/script-test-gitops
    path: deploy/k8s/overlays/test
  destination:
    server: https://kubernetes.default.svc
    namespace: hive-test
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
