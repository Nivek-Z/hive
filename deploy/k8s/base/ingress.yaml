apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hive-web
  labels:
    app.kubernetes.io/name: hive
spec:
  ingressClassName: traefik
  rules:
    - host: hive.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hive-app
                port:
                  name: http
