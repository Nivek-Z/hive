name: Secret Scan

# 任何提交 / PR 都扫描是否误提交了密钥、令牌、私钥等敏感信息
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 拉全历史，让 gitleaks 能扫提交历史

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 个人仓库免费，无需 GITLEAKS_LICENSE；自动读取根目录 .gitleaks.toml
