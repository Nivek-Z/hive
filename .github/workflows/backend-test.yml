name: Backend Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run unit and Web MVC tests
        run: mvn -B test -f hive/pom.xml

      - name: Run MySQL integration tests
        run: mvn -B verify -Pintegration -f hive/pom.xml
