name: Backend Tests

# 后端代码变更时自动跑单元测试（纯单测，无需数据库）
on:
  push:
    paths:
      - "hive/src/main/java/**"
      - "hive/src/test/**"
      - "hive/pom.xml"
      - ".github/workflows/backend-test.yml"
  pull_request:
    paths:
      - "hive/src/main/java/**"
      - "hive/src/test/**"
      - "hive/pom.xml"
      - ".github/workflows/backend-test.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend tests
        run: mvn -B test -f hive/pom.xml
