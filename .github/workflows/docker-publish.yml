name: Build & Publish Docker image

# 触发时机：推送到 main、打 v* 版本标签、或在 Actions 页面手动触发
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # 镜像名 = ghcr.io/<owner>/<repo>（metadata-action 会自动转小写）
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read      # 拉取源码
      packages: write     # 推送镜像到 GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # 仓库内置令牌，无需额外配置

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # 生成标签：分支名、版本号(vX.Y.Z)、commit sha、main 分支额外打 latest
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./hive            # 构建上下文 = 唯一一份源码目录
          file: ./hive/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 复用 GitHub Actions 缓存，加速重复构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
