name: Build & Publish Docker image

on:
  push:
    branches: [codex/script-test-gitops]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # 镜像名 = ghcr.io/<owner>/<repo>（metadata-action 会自动转小写）
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend verification
        run: mvn -B verify -Pintegration -f hive/pom.xml

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name and immutable tag
        id: image
        shell: bash
        run: |
          image="$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=raw,value=${{ steps.image.outputs.tag }}
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./hive
          file: ./hive/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update test environment image tag
        if: github.ref == 'refs/heads/codex/script-test-gitops'
        env:
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
        shell: bash
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          path = Path("deploy/k8s/overlays/test/kustomization.yaml")
          tag = os.environ["IMAGE_TAG"]
          lines = path.read_text(encoding="utf-8").splitlines()
          updated = []
          replaced = False
          for line in lines:
              if not replaced and line.strip().startswith("newTag:"):
                  indent = line[:len(line) - len(line.lstrip())]
                  updated.append(f"{indent}newTag: {tag}")
                  replaced = True
              else:
                  updated.append(line)
          if not replaced:
              raise SystemExit("newTag not found in test kustomization")
          path.write_text("\n".join(updated) + "\n", encoding="utf-8")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/k8s/overlays/test/kustomization.yaml
          if git diff --cached --quiet; then
            echo "Test overlay already points at ${IMAGE_TAG}."
            exit 0
          fi
          git commit -m "ci: deploy test image ${IMAGE_TAG} [skip ci]"
          git push origin HEAD:codex/script-test-gitops
